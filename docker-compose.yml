version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: webflux-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: webflux_hex_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - webflux-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/webflux_hex_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webflux-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/webflux_hex_db
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - webflux-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  webflux-network:
    driver: bridge
